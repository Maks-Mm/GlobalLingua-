            <form id="appointmentForm">
                <div class="form-group" data-aos="fade-up" data-aos-delay="250">

                <div class="form-group" data-aos="fade-up" data-aos-delay="450">

                </div>
                <button type="submit" class="btn" data-aos="pulse" data-aos-delay="500" data-i18n="submit-btn">Request appointment</button>
